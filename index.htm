function autoBattleAct(g){
  if(over||!autoBattle||battleState!=='player_action'||activeGirl!==g||g.down)return;
  const enemies=am();
  if(!enemies.length)return;
  // Pick the best enemy target
  const priorityTarget=()=>{
    const exposed=enemies.filter(m=>m._hkExposed>0);
    if(exposed.length)return exposed.sort((a,b)=>a.hp-b.hp)[0];
    const ritual=enemies.filter(m=>(m._ritualProgress||0)>0);
    if(ritual.length)return ritual.sort((a,b)=>a.hp-b.hp)[0];
    const healers=enemies.filter(m=>m.abilityFn==='healAlly');
    if(healers.length)return healers.sort((a,b)=>a.hp-b.hp)[0];
    return enemies.sort((a,b)=>a.hp-b.hp)[0];
  };
  const hurtAlly=()=>girls.filter(x=>!x.down).sort((a,b)=>(a.hp/a.mHp)-(b.hp/b.mHp))[0];
  // Decide action: ult > skill > attack
  let choice='attack';
  if(g.mana>=ULT_COST&&g.uFn)choice='ultimate';
  else if(g.scd<=0&&g.sFn&&g.sFn!=='manaConvert')choice='skill';
  // Determine if this action will require a manual target after selectAction
  const willNeedEnemy=(choice==='attack')||(choice==='skill'&&SKILLS_NEED_ENEMY_TARGET.includes(g.sFn))||(choice==='ultimate'&&ULTS_NEED_ENEMY_TARGET.includes(g.uFn));
  const willNeedAlly=(choice==='skill'&&SKILLS_NEED_ALLY_TARGET.includes(g.sFn))||(choice==='ultimate'&&ULTS_NEED_ALLY_TARGET.includes(g.uFn));
  selectAction(choice);
  // After selectAction, if we're now in a targeting state, pick automatically
  setTimeout(()=>{
    if(over||!autoBattle)return;
    if(battleState==='player_target_enemy'&&willNeedEnemy){
      const m=priorityTarget();if(m)selectEnemy(monsters.indexOf(m));
    } else if(battleState==='player_target_ally'&&willNeedAlly){
      const a=hurtAlly();if(a)selectAlly(girls.indexOf(a));
    } else if(battleState==='player_action'&&activeGirl===g){
      // selectAction didn't consume the turn (e.g. skill on cd race) — fall back to attack
      selectAction('attack');
      setTimeout(()=>{if(battleState==='player_target_enemy'){const m=priorityTarget();if(m)selectEnemy(monsters.indexOf(m));}},300);
    }
  },400);
}
function advanceTurn(){
  if(over)return;
  if(queueIdx>=queue.length){
    if(!am().length){endBattle(true);return;}if(!ag().length){endBattle(false);return;}
    roundNum++;queue=buildQueue();queueIdx=0;currentActorIdx=-1;
    // Blizzard weather effect — ticks each round
    if(window._blizzard&&window._blizzard.turnsLeft>0){
      window._blizzard.turnsLeft--;
      am().forEach(m=>{
        m._blizzardSlowed=true;
        const dmg=Math.max(1,Math.round(m.mHp*0.05));
        m.hp=Math.max(0,m.hp-dmg);
        log(`Blizzard: ${m.name} takes ${dmg} frost damage!`,"ul");
        checkDead(m,null);
      });
      if(window._blizzard.turnsLeft>0)log(`Blizzard: ${window._blizzard.turnsLeft} round${window._blizzard.turnsLeft===1?'':'s'} remaining.`,"ul");
      else{log("The blizzard dissipates.","ul");am().forEach(m=>{m._blizzardSlowed=false;});window._blizzard=null;}
    }
    tickSaplings();
    // Swamp Gas passive — poisons one random girl at round start
    monsters.filter(m=>!m.dead&&m.abilityFn==='swampGasPassive').forEach(m=>{
      const alive=girls.filter(g=>!g.down);if(!alive.length)return;
      const t=rnd(alive);
      if(!t._stalwart&&!(t._pyreImmune>0)){
        t.poisoned=Math.max(t.poisoned||0,3);t.poisonDmg=Math.max(t.poisonDmg||0,7);
        log(`${m.name} fills the air with swamp gas, ${t.name} is poisoned!`,"px");
      }
    });
    if(hasArtifact('voidwalker')){
      const umbria=girls.find(g=>g.role==='Shadow Knight'&&!g.down);
      if(umbria){umbria._spectralShield=2;girls.filter(x=>!x.down).forEach(a=>{a._spectralWarded=umbria;});log("Voidwalker's Cloak, Umbria's shield resets to 2!","hl");}
    }
    if(roundNum%4===0){crowdCheer();}
  }
  if(!am().length){endBattle(true);return;}if(!ag().length){endBattle(false);return;}
  currentActorIdx=queueIdx;const actor=queue[queueIdx++];
  if(actor.type==='girl'){
    const g=actor.entity;if(g.down){renderBattle();setTimeout(advanceTurn,50);return;}
    const canAct=actor.extraTurn?true:tickGirlPassives(g);if(!canAct||g.down){renderBattle();setTimeout(advanceTurn,400);return;}
    if(g._mad>0){g._mad--;if(g._clearwater){log(`${g.name} resists the madness, Clearwater Charm protects her!`,"hl");renderBattle();setTimeout(advanceTurn,500);return;}log(`${g.name} is maddened, she stares into the void and loses her turn!`,"bs");renderBattle();setTimeout(advanceTurn,800);return;}
    if(g._charmed){
      g._charmed=false;
      if(g._clearwater||hasArtifact('sirenslocket')){log(`${g.name} resists the charm!`,"hl");renderBattle();setTimeout(advanceTurn,500);return;}
      const victims=girls.filter(x=>!x.down&&x!==g);
      const victim=rnd(victims);
      if(victim){const r=damageGirl(victim,gea(g));log(`${g.name} is CHARMED, attacks ${victim.name} for ${r.d}!`,"bs");checkGirlDown(victim);}
      else log(`${g.name} is charmed but has no allies to strike.`);
      gf(3);renderBattle();setTimeout(advanceTurn,900);return;
    }
    if(g._ironStance&&g._taunting>0){log(`${g.name} holds the Iron Challenge, enemies locked on her. She cannot act.`,"hl");renderBattle();setTimeout(advanceTurn,700);return;}
    if(g._ironStance&&g._taunting<=0){g._ironStance=false;}
    if(g._waltz>0&&!actor.extraTurn){g._waltz--;log(`${g.name} continues Death's Waltz!`,"wz");waltzStrike(g);if(!am().length){endBattle(true);return;}renderBattle();setTimeout(advanceTurn,850);return;}
    if(g._waltz>0&&actor.extraTurn){waltzStrike(g);if(!am().length){endBattle(true);return;}renderBattle();setTimeout(advanceTurn,850);return;}
    battleState='player_action';activeGirl=g;renderBattle();
    if(autoBattle){autoBattleTimer=setTimeout(()=>autoBattleAct(g),600);}
  } else {
    const m=actor.entity;if(m.dead){renderBattle();setTimeout(advanceTurn,50);return;}
    battleState='monster_turn';renderBattle();
    setTimeout(()=>{processMonsterTurn(m);if(!am().length){endBattle(true);return;}if(!ag().length){endBattle(false);return;}battleState='idle';renderBattle();setTimeout(advanceTurn,900);},700);
  }
}

function selectAction(type){
  if(battleState!=='player_action')return;const g=activeGirl;
  if(type==='attack'){
    const alive=am();
    if(alive.length===1){pendingAction={type:'attack'};battleState='player_target_enemy';selectEnemy(monsters.indexOf(alive[0]));}
    else{pendingAction={type:'attack'};battleState='player_target_enemy';renderBattle();}
  } else if(type==='skill'){
    if(g.scd>0)return;
    if(g._bloodCost){const cost=Math.max(1,Math.round(g.hp*.1));g.hp=Math.max(1,g.hp-cost);log(`${g.name} pays ${cost} HP (Blood Cost) to use her skill.`,"bs");}
    if(SKILLS_NEED_ENEMY_TARGET.includes(g.sFn)){
      const alive=am();
      if(alive.length===1){
        g.scd=g.sCd;
        if(g.sFn==='riptide')riptide(g,alive[0]);
        else if(g.sFn==='hex')hex(g,alive[0]);
        else if(g.sFn==='huntersGale')huntersGale(g,alive[0]);
        else if(g.sFn==='lunarStrike')lunarStrike(g,alive[0]);
        else if(g.sFn==='disarm')disarm(g,alive[0]);
        else if(g.sFn==='hexMark')hexMark(g,alive[0]);
        else if(g.sFn==='glacialLance')glacialLance(g,alive[0]);
        else if(g.sFn==='bloodfrenzy')bloodfrenzy(g,alive[0]);
        else if(g.sFn==='undertow')undertow(g,alive[0]);
        else if(g.sFn==='venomChain')venomChain(g,alive[0]);
        else if(g.sFn==='precisionShot')precisionShot(g,alive[0]);
        else if(g.sFn==='solarFlareSkill')solarFlareSkill(g,alive[0]);
        else if(g.sFn==='doomSigil')doomSigil(g,alive[0]);
        else envenom(g,alive[0]);
        if(g._energize){g.mana=Math.min(g.mana_max,g.mana+30);log(`${g.name} Energize, +30 mana!`);}
        finishPlayerTurn();
      }
      else{pendingAction={type:'skill_enemy'};battleState='player_target_enemy';renderBattle();}
    } else if(SKILLS_NEED_ALLY_TARGET.includes(g.sFn)){
      pendingAction={type:'skill_ally'};battleState='player_target_ally';renderBattle();
    } else {
      if(!g._eternalCd)g.scd=g.sCd;window[g.sFn](g);if(g._energize){g.mana=Math.min(g.mana_max,g.mana+30);log(`${g.name} Energize, +30 mana!`);}finishPlayerTurn();
    }
  } else if(type==='revive_target'){
    pendingAction={type:'revive_pick'};battleState='player_target_ally';renderBattle();
    return;
  } else if(type==='hold'){
    holdingGirl=activeGirl;
    battleState='hold_turn';
    renderBattle();
    return;
  } else if(type==='detonate'){
    detonateHex(g);g.scd=g.sCd;finishPlayerTurn();
  } else if(type==='ultimate'){
    if(g.mana<ULT_COST)return;
    if(ULTS_NEED_ENEMY_TARGET.includes(g.uFn)){
      const alive=am();
      if(alive.length===1){g.mana=0;window[g.uFn](g,alive[0]);triggerResonance(g);finishPlayerTurn();}
      else{pendingAction={type:'ult_enemy'};battleState='player_target_enemy';renderBattle();}
    } else if(ULTS_NEED_ALLY_TARGET.includes(g.uFn)){
      const allyAlive=girls.filter(x=>!x.down&&x!==g);
      if(allyAlive.length===1){g.mana=0;window[g.uFn](g,allyAlive[0]);triggerResonance(g);finishPlayerTurn();}
      else{pendingAction={type:'ult_ally'};battleState='player_target_ally';renderBattle();}
    } else {
      g.mana=0;window[g.uFn](g);triggerResonance(g);finishPlayerTurn();
    }
  }
}

function selectEnemy(idx){
  if(battleState!=='player_target_enemy')return;const m=monsters[idx];if(!m||m.dead)return;const g=activeGirl;
  if(pendingAction.type==='attack'){
    const naturalCrit=Math.random()<0.15;
    const crowdCrit=g._nextCrit;
    const isCrit=crowdCrit||naturalCrit;
    if(crowdCrit)g._nextCrit=false;
    const locketPenalty=hasArtifact('sirenslocket')?0.8:1;
    const mult=(isCrit?1.75:1)*locketPenalty;
    // Naia splits her attack between two targets for half damage each
    const aliveNow=am();
    // Sylvi AOE turn after Hunter's Gale
    if(g._sylviAOE){
      g._sylviAOE=false;
      aliveNow.forEach(t=>{const d=dealDmg(t,gea(g)*mult);if(d>0)log(`${g.name} hunts ${t.name} for ${d}.`,"hl");checkDead(t,g);});
    } else if(g.role==='Water Mage'&&aliveNow.length>1&&!hasArtifact('tideblessing')){
      const t2=rnd(aliveNow.filter(x=>x!==m))||m;
      const d1=dealDmg(m,gea(g)*mult*.5);
      const d2=dealDmg(t2,gea(g)*mult*.5);
      if(d1>0)log(`${g.name}${isCrit?" CRIT":""} surges at ${m.name} for ${d1} and ${t2.name} for ${d2}.`,"hl");
      checkDead(m,g);checkDead(t2,g);
    } else if(g.role==='Water Mage'&&aliveNow.length>1&&hasArtifact('tideblessing')){
      // Tide's Blessing, hit all enemies for 30%
      aliveNow.forEach(t=>{const d=dealDmg(t,gea(g)*mult*.3);if(d>0)log(`${g.name} Tide's Blessing surges at ${t.name} for ${d}.`,"hl");checkDead(t,g);});
    } else {
      const d=dealDmg(m,gea(g)*mult);
      // Parry, reflect 50% back
    if(m._parrying&&d>0){
      m._parrying=false;
      const reflect=Math.round(d*0.5);
      g.hp=Math.max(1,g.hp-reflect);
      log(`${m.name} PARRIES, reflects ${reflect} damage back at ${g.name}!`,"bs");
    }
    if(d>0)log(`${g.name}${isCrit?" CRITICAL HIT !!":""} attacks ${m.name} for ${d}.`,"hl");
      // Plague Touch — basic attacks apply poison
    if(g._plagueTouch&&!m.dead){
      m.poisoned=Math.max(m.poisoned||0,3);m.poisonDmg=Math.max(m.poisonDmg||0,8);
      log(`${g.name}'s Plague Touch poisons ${m.name}!`,"px");
    }
    if(hasArtifact('poisonflask')&&Math.random()<0.25&&!m.dead){
        m.poisoned=Math.max(m.poisoned||0,3);m.poisonDmg=Math.max(m.poisonDmg||0,8);
        log(`Poison Flask, ${m.name} is poisoned!`,"px");
      }
      checkDead(m,g);
      if(g._lifesteal&&d>0){const h=applyHeal(g,g,Math.round(d*.25));log(`${g.name} lifesteals ${h} HP!`,"he");}
      // Support basic attack heal fires BEFORE thorn reflect damage
      if(['Support','Bard','Ashen Priest','Star Diviner','Dawn Bringer','Hexblade'].includes(g.role)){
        const healTarget=girls.filter(x=>!x.down).sort((a,b)=>(a.hp/a.mHp)-(b.hp/b.mHp))[0];
        if(healTarget){
          const shBase=Math.round(18+g.atk*.25+(g._int||0)*.5);
          const sh=applyHeal(g,healTarget,shBase);
          log(`${g.name} tends to ${healTarget.name} (+${sh} HP).`,"he");
          if(g._ric){const t2=girls.filter(x=>!x.down&&x!==healTarget)[0];if(t2){const sh2=applyHeal(g,t2,Math.round(shBase*.7));log(`  Ricochet heals ${t2.name} for ${sh2}!`,"he");}}
        }
      }
    // Thorn reflect damage applied after support heal
    if(window._thornReflectAmt>0){
      log(`${g.name} is scratched by thorns for ${window._thornReflectAmt}!`,"bs");
      if(g.hp<=0&&!g.down)checkGirlDown(g);
    }
    // Mirror Wraith reflect
    if(window._mirrorReflect>0){
      log(`${g.name}'s attack is reflected by Mirror Skin for ${window._mirrorReflect}!`,"bs");
      if(g.hp<=0&&!g.down)checkGirlDown(g);
    }
    window._thornAttacker=null;window._thornReflectAmt=0;window._mirrorReflect=0;
    }
    if(g._manaOnHit)g.mana=Math.min(g.mana_max,g.mana+15);
    if(g._chain&&Math.random()<.4){const t2=rnd(am().filter(x=>x!==m));if(t2){const d2=dealDmg(t2,gea(g)*mult);if(d2>0)log(`  Chain Strike, ${t2.name} takes ${d2}!`,"hl");checkDead(t2,g);}}
    if(g._dbl&&g.role!=='Water Mage'){const t2=rnd(am());if(t2){const d2=dealDmg(t2,gea(g));if(d2>0)log(`${g.name} hits again, ${t2.name} for ${d2}.`);checkDead(t2,g);}}
  } else if(pendingAction.type==='ult_enemy'){
    g.mana=0;window[g.uFn](g,m);triggerResonance(g);finishPlayerTurn();
    return;
  } else if(pendingAction.type==='skill_enemy'){
    g.scd=g.sCd;
    if(g.sFn==='riptide')riptide(g,m);
    else if(g.sFn==='hex')hex(g,m);
    else if(g.sFn==='huntersGale')huntersGale(g,m);
    else if(g.sFn==='lunarStrike')lunarStrike(g,m);
    else if(g.sFn==='disarm')disarm(g,m);
    else if(g.sFn==='hexMark')hexMark(g,m);
    else if(g.sFn==='glacialLance')glacialLance(g,m);
    else if(g.sFn==='bloodfrenzy')bloodfrenzy(g,m);
    else if(g.sFn==='undertow')undertow(g,m);
    else if(g.sFn==='venomChain')venomChain(g,m);
    else if(g.sFn==='precisionShot')precisionShot(g,m);
    else if(g.sFn==='solarFlareSkill')solarFlareSkill(g,m);
    else if(g.sFn==='doomSigil')doomSigil(g,m);
    else envenom(g,m);
    if(g._energize){g.mana=Math.min(g.mana_max,g.mana+30);log(`${g.name} Energize, +30 mana!`);}
  }
  finishPlayerTurn();
}

function selectAlly(idx){
  if(battleState!=='player_target_ally')return;const t=girls[idx];if(!t)return;
  const isReviving=pendingAction&&pendingAction.type==='revive_pick';
  if(t.down&&!isReviving)return;const g=activeGirl;
  if(pendingAction.type==='skill_ally'&&g.sFn==='mend'){g.scd=g.sCd;mend(g,t);if(g._energize){g.mana=Math.min(g.mana_max,g.mana+30);log(`${g.name} Energize, +30 mana!`);}}
  else if(pendingAction.type==='skill_ally'&&g.sFn==='purifyingFlame'){g.scd=g.sCd;purifyingFlame(g,t);if(g._energize){g.mana=Math.min(g.mana_max,g.mana+30);log(`${g.name} Energize, +30 mana!`);}}
  else if(pendingAction.type==='skill_ally'&&g.sFn==='dawnCleanse'){g.scd=g.sCd;dawnCleanse(g,t);if(g._energize){g.mana=Math.min(g.mana_max,g.mana+30);log(`${g.name} Energize, +30 mana!`);}}
  else if(pendingAction.type==='skill_ally'&&g.sFn==='astralWard'){g.scd=g.sCd;astralWard(g,t);if(g._energize){g.mana=Math.min(g.mana_max,g.mana+30);log(`${g.name} Energize, +30 mana!`);}}
  else if(pendingAction.type==='ult_ally'){g.mana=0;window[g.uFn](g,t);triggerResonance(g);finishPlayerTurn();return;}
  else if(pendingAction.type==='revive_pick'){
    if(!t.down)return;
    revives--;
    t.down=false;t.hp=Math.round(t.mHp*0.35);
    log(`Revive used — ${t.name} is back at 35% HP! (${revives} remaining)`,"rv");
    gf(8);
    pendingAction=null;
    // Revive does NOT consume the active girl's turn — return to action selection
    battleState='player_action';
    if(!am().length){endBattle(true);return;}
    renderBattle();return;
  }

  finishPlayerTurn();
}

function cancelAction(){if(battleState!=='player_target_enemy'&&battleState!=='player_target_ally')return;battleState='player_action';pendingAction=null;renderBattle();}
function useReviveItem(){
  if(revives<=0)return;
  const downed=girls.filter(g=>g.down);
  if(!downed.length)return;
  // If multiple down, pick most recently downed (last in array)
  const target=downed[downed.length-1];
  revives--;
  target.down=false;
  target.hp=Math.round(target.mHp*0.35);
  log(`Revive used, ${target.name} is back at 35% HP! (${revives} remaining)`,"rv");
  gf(8);
  if(!am().length){endBattle(true);return;}
  renderBattle();
}

function triggerResonance(caster){
  if(!hasArtifact('resonance'))return;
  girls.filter(g=>!g.down&&g!==caster).forEach(g=>{
    g.mana=Math.min(g.mana_max,g.mana+10);
  });
  log(`Resonance Stone, allies gain 10 mana!`,"ul");
}
function finishPlayerTurn(extraTurnGirl){
  if(over)return;
  if(autoBattleTimer){clearTimeout(autoBattleTimer);autoBattleTimer=null;}
  if(activeGirl)window._lastActedGirl=activeGirl;
  pendingAction=null;activeGirl=null;battleState='idle';
  if(!am().length){endBattle(true);return;}if(!ag().length){endBattle(false);return;}
  // Check if any girl has an extra turn queued
  const bonus=extraTurnGirl||girls.find(g=>g._extraTurnQueued&&!g.down);
  if(bonus){
    bonus._extraTurnQueued=false;
    log(`${bonus.name} surges forward for an extra turn!`,"ul");
    renderBattle();
    setTimeout(()=>{
      battleState='player_action';activeGirl=bonus;renderBattle();
    },400);
    return;
  }
  renderBattle();setTimeout(advanceTurn,300);
}

function endBattle(win){
  if(over&&win!=='zulwin')return;
  over=true;battleState='over';activeGirl=null;pendingAction=null;
  if(win==='zulwin'){
    updateSlotRecords('zulwin');
    clearSave();
    runStats.wave=wave;runStats.fans=fans;
    renderBattle('zulwin');
    return;
  }
  if(win){
    const fanBonus=isBoss()?50:25;
    const coinBonus=isBoss()?40:15;
    gf(fanBonus);gc(coinBonus);
    runStats.wavesCleared++;
    // Drain stamina for active squad based on performance
    drainStamina();
    if(isBoss()){
      bossWon=true;runStats.bossesDefeated++;bossCount++;
      if(getArtifactPool().length>0)artifactOffer=true;
      const enc=Math.floor(wave/WPB);
      const milestone=getMilestone(enc);
      log(`BOSS DEFEATED! ${milestone} +${fanBonus} fans, +${coinBonus} coins`,"bs");
    } else {
      log(`Wave cleared! +${fanBonus} fans, +${coinBonus} coins`,"fn");
    }
  } else {
    runStats.wave=wave;runStats.fans=fans;
    runStats.squadNames=girls.map(g=>g.name);
    updateSlotRecords('lose');
    showDefeatScreen();return;
  }
  if(win)saveGame();
  renderBattle(win?(isBoss()?"bwin":"win"):"lose");
}

function getMilestone(enc){
  const lines=[
    "The crowd erupts!",
    "The arena shakes with roaring fans!",
    "Your squad is one of legend.",
    "The story of AEGIS spreads across the land!",
    "No squad has ever survived this deep!",
    "Bards will sing of this for generations!",
    "The monsters themselves are afraid now!",
    "AEGIS is unstoppable. The world watches.",
  ];
  return lines[Math.min(enc-1,lines.length-1)]||lines[lines.length-1];
}

// Maps each ability to what it does + who it targets, shown the turn before it fires
function getIntent(m){
  if(m.dead||m.stunned>0)return null;
  const turnsLeft=Math.max(0,m.abilityMaxCd-m.abilityCd);
  // Dark Ritual always telegraphs (it channels every turn)
  if(m.abilityFn==='darkRitual'){
    const prog=m._ritualProgress||0;
    return{text:`DARK RITUAL ${prog}/3 — interrupt!`,scope:'aoe',target:null,turnsLeft:0};
  }
  // Only telegraph when the ability fires next turn (or this is a passive/imminent)
  if(turnsLeft>1)return null;
  // Resolve the target for deterministic targeting abilities
  const resolveTarget=()=>{
    const alive=girls.filter(g=>!g.down);if(!alive.length)return null;
    const taunter=alive.find(g=>g._taunting>0);if(taunter)return taunter;
    if(m.targeting==='strongest')return[...alive].sort((a,b)=>b.atk-a.atk)[0];
    if(m.targeting==='tankiest')return[...alive].sort((a,b)=>b.mHp-a.mHp)[0];
    if(m.targeting==='weakest')return[...alive].sort((a,b)=>(a.hp/a.mHp)-(b.hp/b.mHp))[0];
    if(m.targeting==='last_acted')return window._lastActedGirl&&!window._lastActedGirl.down?window._lastActedGirl:null;
    return null; // random
  };
  // Per-ability intent: {icon, text, scope: 'single'|'aoe'|'self'|'random', target}
  const A=m.abilityName;
  const INTENTS={
    'Cheap Shot':{text:'Heavy strike',scope:'single'},
    'War Cry':{text:'Buffs allies',scope:'self'},
    'Soul Rend':{text:'Cuts your ATK',scope:'single'},
    'Volley':{text:'Hits everyone',scope:'aoe'},
    'Cursed Touch':{text:'Random debuff',scope:'random'},
    'Chase':{text:'Strikes last actor',scope:'single'},
    'Miasma':{text:'Poisons someone',scope:'random'},
    'Overcharge':{text:'Charging a big hit',scope:'self'},
    'Flame Breath':{text:'Burns 2 girls',scope:'aoe'},
    'Parry':{text:'Will counter',scope:'self'},
    'Debilitate':{text:'Random debuff',scope:'random'},
    'Fortify':{text:'Shields Zul',scope:'self'},
    'Poison Breath':{text:'Poisons all',scope:'aoe'},
    'Entangle':{text:'Roots a girl',scope:'single'},
    'Regenerate':{text:'Heals itself',scope:'self'},
    'Haunt':{text:'Weakens a girl',scope:'single'},
    'Guard Break':{text:'HUGE strike — guard up',scope:'single'},
    'Mirror Skin':{text:'Reflects — debuff it!',scope:'self'},
    'Dark Ritual':{text:'Channeling doom',scope:'aoe'},
    'Blood Ritual':{text:'Heals an ally',scope:'self'},
    'Bloodlust':{text:'Enraging at half HP',scope:'self'},
    'Cleansing Tide':{text:'Cleanses an ally',scope:'self'},
    'Cosmic Crush':{text:'Weakens and slows a girl',scope:'single'},
    'Curse Brand':{text:'Marks weakest for extra damage',scope:'single'},
    'Demonic Surge':{text:'Buffs all demons',scope:'aoe'},
    'Dim Light':{text:'Strips all buffs from a girl',scope:'single'},
    'Infernal Bite':{text:'Heavy hit and burn',scope:'single'},
    'Life Drain':{text:'Drains HP from a girl',scope:'single'},
    'Lunar Drain':{text:'Drains mana from a girl',scope:'single'},
    'Lure':{text:'Charms weakest girl',scope:'single'},
    'Mischief':{text:'Random debuff',scope:'random'},
    'Mist Form':{text:'Gains DEF',scope:'self'},
    'Poison Cloud':{text:'Poisons all',scope:'aoe'},
    'Shade Ward':{text:'Intercepts next hit on ally',scope:'self'},
    'Soul Scream':{text:'Hits entire squad',scope:'aoe'},
    'Thorn Reflect':{text:'Reflects damage taken',scope:'self'},
    'Umbral Veil':{text:'Gives all monsters evasion',scope:'aoe'},
    'Unholy Shield':{text:'Shields injured ally',scope:'self'},
    'Wail':{text:'Weakens entire squad',scope:'aoe'},
  };
  const base=INTENTS[A]||{text:A,scope:m.targeting==='random'?'random':'single'};
  let tgt=null;
  if(base.scope==='single')tgt=resolveTarget();
  return{...base,target:tgt,turnsLeft};
}

function shopRarityRoll(){
  // Scale shop rarity with wave, later waves get much better items
  const r=Math.random();
  if(wave>=7) return r<0.08?0.97:r<0.25?0.87:r<0.55?0.7:r;  // gold 8%, epic 17%, rare 30%
  if(wave>=5) return r<0.04?0.97:r<0.18?0.87:r<0.5?0.7:r;   // gold 4%, epic 14%, rare 32%
  if(wave>=3) return r<0.01?0.97:r<0.10?0.87:r<0.45?0.7:r;  // gold 1%, epic 9%, rare 35%
  return r<0.40?0.7:r;                                         // rare 40%, no epic/gold early
}

function countAndCleanse(g,healPerDebuff){
  let count=0;
  if(g.poisoned>0){count+=g.poisoned;g.poisoned=0;g.poisonDmg=0;}
  if(g.burning>0){count+=g.burning;g.burning=0;g.burnDmg=0;}
  if(g.weakened>0){count++;g.weakened=0;}
  if(g._charmed){count++;g._charmed=false;}
  if(g._mad>0){count+=g._mad;g._mad=0;}
  if(count>0){
    const heal=count*healPerDebuff;
    g.hp=Math.min(g.mHp,g.hp+heal);
    return{count,heal};
  }
  return{count:0,heal:0};
}

function purifyingFlame(g,target){
  if(!target){
    // Auto-pick most debuffed ally
    const scored=girls.filter(x=>!x.down).map(x=>({g:x,s:(x.poisoned||0)+(x.burning||0)+(x.weakened||0)+(x._charmed?1:0)+(x._mad||0)}));
    target=scored.sort((a,b)=>b.s-a.s)[0]?.g||rnd(girls.filter(x=>!x.down));
  }
  if(!target)return;
  const healPer=Math.round(g.atk*2.5);
  const {count,heal}=countAndCleanse(target,healPer);
  // Always apply a base heal regardless of debuffs
  const baseHeal=Math.round(g.atk*1.5);
  target.hp=Math.min(target.mHp,target.hp+baseHeal);
  if(count>0)log(`${g.name} Purifying Flame, cleanses ${count} debuff${count===1?'':'s'} from ${target.name}, heals ${heal+baseHeal} HP!`,"he");
  else log(`${g.name} Purifying Flame, ${target.name} was clean, heals ${baseHeal} HP.`,"he");
  if(g._ric){const t2=girls.filter(x=>!x.down&&x!==target&&((x.poisoned||0)+(x.burning||0)+(x.weakened||0))>0)[0];if(t2){t2.poisoned=Math.max(0,(t2.poisoned||0)-2);t2.burning=Math.max(0,(t2.burning||0)-1);log(`  Ricochet, ${t2.name} partially cleansed!`,"he");}}
  gf(4);
}

function sacredPyre(g){

es for 2.2x ATK damage, then fills the squad with sea air, boosting everyone's ATK by 30% for 3 turns.",purifyingFlame:"Cleanses all debuffs from one chosen ally and heals for each removed. Always applies a base heal regardless of debuffs.",sacredPyre:"Cleanses ALL debuffs from the entire squad, healing for each removed, then grants 2 turns of full debuff immunity to everyone.",spectralShield:"Umbria intercepts the next 3 hits aimed at any ally, taking the damage herself. Use it to protect low-HP teammates.",veilOfShadows:"Wraps the entire squad in shadow for 3 turns. Every incoming hit has a 50% chance to miss entirely.",huntersGale:"Slows all enemies for 2 turns with burst damage on one. Her next basic attack hits all enemies.",stormOfArrows:"Poisons, damages, and stuns all enemies simultaneously.",lunarStrike:"High single-target damage. Leaves the target Vulnerable, they take 30% more damage until their next turn.",fullMoon:"Massive single-target hit. Strikes twice if the target is Vulnerable.",manaConvert:"Passive, 15% of all damage Sol absorbs is channelled as mana to her allies automatically.",solarJudgement:"Stuns all enemies for 1 turn and blinds them for 3 turns, 50% miss chance on each attack.",disarm:"Strips one enemy's weapon. Their next 2 attacks are guaranteed misses.",overwhelmingForce:"Taunts all enemies and disarms every one of them simultaneously.",astralWard:"Shields one chosen ally based on Astera's DEF and INT, and grants them 20% evasion for 2 turns.",celestialConfusion:"Blinds all enemies for 3 turns (50% miss) and confuses them, 35% chance per turn to strike their own allies.",dawnCleanse:"Washes debuffs from one ally and heals for each removed, plus a base heal.",firstLight:"Slows all enemies by 50% SPD for 3 turns and hastens all allies by 50% SPD for 3 turns.",hexMark:"Curses one enemy to take 30% more damage from all sources.",voidRift:"Fires 3 random void bolts for 0.8x each — can stack on one target.",precisionShot:"Single target 2.4x damage and marks them for 2 turns (+30% damage taken).",crescentSweep:"Hits all enemies for 1x and applies Vulnerable to every one.",frostNova:"AOE 1x + 2-turn slow on all enemies. Consumes 30% of current shield.",desertRose:"Costs 15% HP. Shields the most injured ally and grants them 1 turn of evasion.",shadowMeld:"Becomes untargetable for 2 turns. Does not protect allies.",solarFlareSkill:"Deals 1.5x to one target and blinds all enemies for 2 turns.",counterStance:"Enters a stance for 2 turns — every hit taken triggers a 1.5x counterattack.",rallyingCry:"Grants the most injured ally an immediate extra turn. No healing.",sacredAsh:"No cleanse — instead grants all allies +15% ATK for 3 turns.",constellation:"Shields all 3 allies for 40% of normal shield value each.",radiantBurst:"Heals all allies for a flat moderate amount. No target, no cleanse.",doomSigil:"Brands one enemy for +60% damage for 1 turn only. Must coordinate burst.",acceleratedRuin:"Grants one chosen ally an immediate extra turn. They act now, then again on their normal queued turn. Pair with high-impact girls like Maeve or Selene for a double hit."};

function getActiveEffects(id){
  const gear=pGear[id]||{};
  const effects=[];
  const seen=new Set();
  ['earrings','dress','shoes'].forEach(slot=>{
    const eq=gear[slot];
    if(!eq)return;
    if(eq.mod&&!seen.has(eq.mod.name)){seen.add(eq.mod.name);effects.push(eq.mod.name);}
    if(eq.mod2&&!seen.has(eq.mod2.name)){seen.add(eq.mod2.name);effects.push(eq.mod2.name);}
  });
  return effects;
}

  const scoutHTML=window._scoutedBoss?`<div style="background:var(--color-background-secondary);border:1.5px solid #7F77DD;border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:10px;"><div style="font-size:11px;color:#7F77DD;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Scout Report</div><div style="font-size:14px;font-weight:700;color:var(--color-text-primary);margin-bottom:3px;">${window._scoutedBoss.name}</div><div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;">${window._scoutedBoss.role}</div><div style="font-size:12px;"><b>${window._scoutedBoss.abilityFn==='summonLegion'?'Summon Legion':'Ability'}:</b> <span style="color:var(--color-text-secondary);">${(ENEMY_DESCRIPTIONS[window._scoutedBoss.name]||{}).abilityDesc||'Information unavailable.'}</span></div></div>`:coins>=scoutCost?`<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:13px;font-weight:500;color:#D4537E;">Scout Next Boss</div><div style="font-size:11px;color:var(--color-text-secondary);">Learn which boss you'll face next and read their full breakdown.</div></div><button class="btn small gold" onclick="scoutBoss()">Scout (${scoutCost}c)</button></div>`:`<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:10px;opacity:.5;"><div style="font-size:13px;font-weight:500;color:#D4537E;">Scout Next Boss, ${scoutCost}c</div><div style="font-size:11px;color:var(--color-text-secondary);">Not enough coins.</div></div>`;
  const rerollCost2=10;
  const rerollHTML=`<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:12px;color:var(--color-text-secondary);">Not what you were looking for?</div></div>${coins>=rerollCost2?`<button class="btn small gold" onclick="rerollShop()">Reroll Shop (${rerollCost2}c)</button>`:`<span style="font-size:11px;color:var(--color-text-secondary);">${rerollCost2}c to reroll</span>`}</div>`;
  const shopHTML=reviveBuyHTML+rerollHTML+scoutHTML+shopC.map((g,i)=>{const basepr=g.rarity==="gold"||g.rarity==="unique"?30:g.rarity==="epic"?20:g.rarity==="rare"?18:10;const ffLevel=activeMetaUnlocks.upgrades.fortunesFavour||0;const pr=ffLevel>0?Math.max(1,Math.round(basepr*(1-0.05*ffLevel))):basepr;return`<div class="gear-card ${g.rarity}"><div style="display:flex;justify-content:space-between;align-items:start;gap:8px;"><div><div style="font-size:13px;font-weight:500;color:#D4537E;">${g.name}</div><div class="rc-${g.rarity}" style="font-size:11px;">${g.rarity} · ${g.slot}</div><div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px;">${gss(g)}</div>${g.mod?`<div class="mod-tag tip">${g.mod.name}: ${g.mod.desc}<span class="tip-box"><b>${g.mod.name}</b><br>${MOD_DESCRIPTIONS[g.mod.name]||g.mod.desc}</span></div>`:''} ${g.mod2?`<div class="mod-tag tip" style="border-color:#D4AF37;color:#B8860B;">${g.mod2.name}: ${g.mod2.desc}<span class="tip-box"><b>${g.mod2.name}</b><br>${MOD_DESCRIPTIONS[g.mod2.name]||g.mod2.desc}</span></div>`:''}</div><button class="btn small" onclick="buyS(${i},${pr})" ${coins<pr?"disabled":""}>Buy (${pr}c)</button></div></div>`;}).join('');
  const sorted=filteredSortedInv();
  const comparePanel=compareGear?compareEquipHTML(inv[compareGear.invIdx],compareGear.gid):'';
  const slotFilterBanner=invSlotFilter?`<div style="background:rgba(212,83,126,.1);border:1px solid #D4537E;border-radius:6px;padding:6px 12px;margin-bottom:8px;font-size:12px;display:flex;justify-content:space-between;align-items:center;"><span style="color:#D4537E;">Showing <b>${invSlotFilter.slot}</b> items for equipping</span><button onclick="invSlotFilter=null;renderUpgrade('inv')" style="background:none;border:none;color:#D4537E;cursor:pointer;font-size:12px;">✕ Clear</button></div>`:'';
  const invHTML=`${comparePanel}${eqOverviewHTML()}${slotFilterBanner}<div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:10px;"><div style="display:flex;gap:4px;"><button class="filter-btn ${invFilter==='all'?"active":''}" onclick="setFilter('all')">All</button><button class="filter-btn ${invFilter==='earrings'?"active":''}" onclick="setFilter('earrings')">Earrings</button><button class="filter-btn ${invFilter==='dress'?"active":''}" onclick="setFilter('dress')">Dress</button><button class="filter-btn ${invFilter==='shoes'?"active":''}" onclick="setFilter('shoes')">Shoes</button></div><div style="margin-left:auto;display:flex;gap:4px;"><button class="sort-btn ${invSort==='epic'?"active":''}" onclick="setSort('epic')">Epic first</button><button class="sort-btn ${invSort==='common'?"active":''}" onclick="setSort('common')">Common first</button><button class="sort-btn ${invSort==='slot'?"active":''}" onclick="setSort('slot')">By slot</button></div></div>${sorted.length?sorted.map(g=>`<div class="gear-card ${g.rarity}"><div style="display:flex;justify-content:space-between;align-items:start;gap:6px;"><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;color:#D4537E;">${g.name} <span class="rc-${g.rarity}" style="font-size:10px;font-weight:400;">${g.rarity}</span></div><div style="font-size:11px;color:var(--color-text-secondary);margin-top:1px;">${g.slot} · ${gss(g)}</div>${g.mod?`<div class="mod-tag tip">${g.mod.name}: ${g.mod.desc}<span class="tip-box"><b>${g.mod.name}</b><br>${MOD_DESCRIPTIONS[g.mod.name]||g.mod.desc}</span></div>`:''} ${g.mod2?`<div class="mod-tag tip" style="border-color:#D4AF37;color:#B8860B;">${g.mod2.name}: ${g.mod2.desc}<span class="tip-box"><b>${g.mod2.name}</b><br>${MOD_DESCRIPTIONS[g.mod2.name]||g.mod2.desc}</span></div>`:''}</div><div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0;">${roster.map(id=>{const gb=ALL_GIRLS.find(x=>x.id===id);return`<button class="btn small" onclick="startEquip(${g._i},${id})">to ${gb.name}</button>`;}).join('')}<button class="btn small danger" onclick="breakdown(${g._i})">Break (+5c)</button></div></div></div>`).join(''):`<div class="hint">${inv.length===0?'Inventory is empty.':'No items match this filter.'}</div>`}`;
  const activeBuffs=ARENA_UPGRADES.filter(u=>AL[u.id]>0);
  const buffSummary=activeBuffs.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;">${activeBuffs.map(u=>`<span style="font-size:10px;padding:2px 8px;border-radius:999px;background:#EAF3DE;color:#3B6D11;font-weight:500;">${u.name} ${AL[u.id]}/${u.maxLevel}</span>`).join('')}</div>`:'';
  const showRecruit=bossWon&&recruitCandidates.length>0;
  const showSquad=roster.length>3;
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span class="sl">Rest stop, after wave ${wave}</span><span style="font-size:10px;color:var(--color-text-success);">✓ Saved</span><button onclick="abandonRun()" class="btn" style="font-size:11px;padding:4px 12px;border-color:#E24B4A;color:#E24B4A;">New Run</button><span style="display:flex;gap:12px;"><span class="coin-b"><i class="ti ti-coin" aria-hidden="true"></i>${coins} coins</span><span style="font-size:13px;color:#BA7517;font-weight:500;"><i class="ti ti-users" aria-hidden="true"></i>${fans} fans</span></span></div><div style="margin-bottom:10px;">${wavePips()}</div>${buffSummary}${activeArtifactsHTML()}<div style="display:flex;gap:4px;margin-bottom:12px;border-bottom:.5px solid var(--color-border-tertiary);padding-bottom:8px;flex-wrap:wrap;">${showRecruit?`<button class="tab ${atab==="recruit"?"active":''}" onclick="renderUpgrade('recruit')" style="color:#3B6D11;font-weight:500;">Recruit!</button>`:''}${artifactOffer?`<button class="tab ${atab==="artifactoffer"?"active":''}" onclick="renderUpgrade('artifactoffer')" style="color:#B8860B;font-weight:500;">Artifact!</button>`:''}${showSquad?`<button class="tab ${atab==="squad"?"active":''}" onclick="renderUpgrade('squad')">Squad</button>`:''}<button class="tab ${atab==="offers"?"active":''}" onclick="renderUpgrade('offers')">Free offer${claimed?" (taken)":''}</button><button class="tab ${atab==="shop"?"active":''}" onclick="renderUpgrade('shop')">Shop</button><button class="tab ${atab==="inv"?"active":''}" onclick="renderUpgrade('inv')">Inventory (${inv.length})</button><button class="tab ${atab==="arena"?"active":''}" onclick="renderUpgrade('arena')">Arena</button></div><div style="max-height:420px;overflow-y:auto;padding-right:4px;">${tab==="recruit"?recruitHTML():tab==="artifactoffer"?artifactOfferHTML():tab==="squad"?squadHTML():tab==="arena"?arenaHTML():tab==="offers"?offerHTML:tab==="shop"?shopHTML:tab==="artifacts"?shopHTML:invHTML}</div><div style="margin-top:12px;"><button class="btn primary" onclick="nextWave()">Fight wave ${wave+1}${(wave+1)%WPB===0?", BOSS":""} →</button></div>`;
}
function setFilter(f){invFilter=f;invSlotFilter=null;renderUpgrade('inv');}
function openSlotPopup(e,gid,slot){
  e.stopPropagation();
  const popup=document.getElementById('slotPopup');
  if(!popup)return;
  const items=inv.filter(g=>g.slot===slot).sort((a,b)=>({'gold':0,'epic':1,'rare':2,'common':3,'cursed':4}[a.rarity]??5)-({'gold':0,'epic':1,'rare':2,'common':3,'cursed':4}[b.rarity]??5));
  if(!items.length){popup.style.display='none';return;}
  popup.innerHTML=`<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;">${slot} · ${items.length} item${items.length>1?'s':''}</div>`+
    items.map((item,i)=>{
      const realIdx=inv.indexOf(item);
      const modLine=item.mod?`<div style="font-size:10px;color:#A0C0FF;margin-top:1px;">${item.mod.name}: ${item.mod.desc}${item.mod2?` · ${item.mod2.name}: ${item.mod2.desc}`:''}</div>`:'';
      return`<div style="display:flex;justify-content:space-between;align-items:start;padding:5px 0;border-bottom:1px solid var(--color-border-primary);">
        <div style="flex:1;min-width:0;"><div class="rc-${item.rarity}" style="font-size:12px;font-weight:600;">${item.name}</div><div style="font-size:10px;color:var(--color-text-secondary);">${gss(item)}</div>${modLine}</div>
        <button class="btn small" onclick="equipFromPopup(${gid},'${slot}',${realIdx})" style="margin-left:6px;flex-shrink:0;">Equip</button>
      </div>`;
    }).join('');
  // Position near cursor
  const x=Math.min(e.clientX+8, window.innerWidth-240);
  const y=Math.min(e.clientY+8, window.innerHeight-340);
  popup.style.left=x+'px';popup.style.top=y+'px';popup.style.display='block';
}
function equipFromPopup(gid,slot,invIdx){
  equip(invIdx,gid);
  document.getElementById('slotPopup').style.display='none';
  renderUpgrade('inv');
}
function closeSlotPopup(){const p=document.getElementById('slotPopup');if(p)p.style.display='none';}

function selectSlotFilter(gid,slot){
  if(invSlotFilter&&invSlotFilter.gid===gid&&invSlotFilter.slot===slot){invSlotFilter=null;}
  else{invSlotFilter={gid,slot};}
  renderUpgrade('inv');
}
function setSort(s){invSort=s;renderUpgrade('inv');}
function takeOffer(i){if(claimed)return;inv.push(offerPool[i]);claimed=true;saveGame();renderUpgrade("offers");}

function buyS(i,pr){if(coins<pr||!shopC[i])return;coins-=pr;inv.push(shopC[i]);shopC.splice(i,1);saveGame();renderUpgrade("shop");}
function rerollShop(){const cost=10;if(coins<cost)return;coins-=cost;shopC=["earrings","dress","shoes"].map(s=>rollGear(s,shopRarityRoll()));saveGame();renderUpgrade("shop");}
function equip(ii,gid){
  const gear=inv[ii];
  if(!pGear[gid])pGear[gid]={earrings:null,dress:null,shoes:null};
  // If girl is currently active, update live stats
  const g=girls.find(x=>x.id===gid);
  if(g){
    if(g.gear[gear.slot]){remGear(g,g.gear[gear.slot]);inv.push(g.gear[gear.slot]);}
    g.gear[gear.slot]=gear;
    applyGear(g,gear);
  } else {
    // Benched, just move old gear to inv if occupied
    if(pGear[gid][gear.slot])inv.push(pGear[gid][gear.slot]);
  }
  pGear[gid][gear.slot]=gear;
  inv.splice(ii,1);saveGame();renderUpgrade("inv");
}
function unequip(gid,slot){
  const g=girls.find(x=>x.id===gid);
  // Bench girls aren't in `girls` array - check pGear directly
  const gear=g?g.gear[slot]:(pGear[gid]?pGear[gid][slot]:null);
  if(!gear)return;
  if(gear.rarity==='cursed'){log('Cursed gear cannot be removed!');alert('Cursed gear cannot be unequipped, it is bound to this girl for the run.');return;}
  if(g){remGear(g,g.gear[slot]);g.gear[slot]=null;}
  inv.push(gear);
  pGear[gid][slot]=null;
  saveGame();renderUpgrade("inv");
}
function breakdown(i){
  const gear=inv[i];const value={common:5,rare:12,epic:22,gold:40,unique:40}[gear.rarity]||5;
  coins+=value;log(`Broke down ${gear.name} for ${value} coins.`,"ar");inv.splice(i,1);
  const el=document.getElementById("sU");
  const scroller=el.querySelector('[style*="overflow-y"]')||el;
  const scrollTop=scroller?scroller.scrollTop:0;
  renderUpgrade("inv");
  requestAnimationFrame(()=>{const sc=document.getElementById("sU").querySelector('[style*="overflow-y"]');if(sc)sc.scrollTop=scrollTop;});
}
function nextWave(){wave++;saveGame();newBattle();}
(function(){const vl=document.getElementById('versionLabel');if(vl)vl.textContent='v'+SAVE_VERSION;})();
showSlotSelect();
</script>
<div id="slotPopup" style="display:none;position:fixed;z-index:999;background:var(--color-background-primary);border:1.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:10px;width:220px;max-height:320px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.5);"></div>
</body>
</html>
